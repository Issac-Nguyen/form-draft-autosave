<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form Draft Autosave — multi-field demo</title>
<style>
  body { font: 15px/1.5 system-ui; max-width: 640px; margin: 40px auto; color: #1e293b; }
  h1 { font-size: 20px; }
  label { display: block; margin: 14px 0 4px; font-weight: 600; }
  input, textarea, .rte { width: 100%; box-sizing: border-box; padding: 8px;
    border: 1px solid #cbd5e1; border-radius: 6px; font: inherit; }
  .rte { min-height: 90px; background: #fff; }
  small { color: #64748b; }
  button { margin-top: 18px; padding: 9px 18px; border: 0; border-radius: 6px;
    background: #2563eb; color: #fff; font: inherit; cursor: pointer; }
  .note { background: #f1f5f9; padding: 12px; border-radius: 8px; margin: 16px 0; }
</style>
</head>
<body>
  <h1>Multi-field autosave demo</h1>
  <div class="note">
    Type into every field, wait ~2s, then reload (Cmd+R). Click the extension icon →
    Restore. All non-sensitive fields should come back. The password should NOT.
  </div>

  <form action="/demo-submit" id="demo">
    <label for="name">Full name (text input)</label>
    <input id="name" name="name" type="text" autocomplete="name">

    <label for="email">Email (email input)</label>
    <input id="email" name="email" type="email" autocomplete="email">

    <label for="subject">Subject (text input)</label>
    <input id="subject" name="subject" type="text">

    <label for="message">Message (textarea #1)</label>
    <textarea id="message" name="message" rows="4"></textarea>

    <label for="details">Extra details (textarea #2)</label>
    <textarea id="details" name="details" rows="4"></textarea>

    <label for="rich">Rich note (contenteditable — like Gmail/Notion)</label>
    <div id="rich" class="rte" contenteditable="true" aria-label="Rich note"></div>

    <label for="pw">Password (MUST NOT be saved)</label>
    <input id="pw" name="pw" type="password" autocomplete="current-password">

    <label for="cc">Card number (MUST NOT be saved)</label>
    <input id="cc" name="cc" type="text" autocomplete="cc-number">

    <button type="submit">Submit (clears the draft)</button>
  </form>

  <div class="note">
    Second independent form on the same page — proves multi-form on one URL:
  </div>
  <form action="/feedback" id="fb">
    <label for="fbtext">Feedback (separate form, separate textarea)</label>
    <textarea id="fbtext" name="fbtext" rows="3"></textarea>
    <button type="submit">Send feedback</button>
  </form>
</body>
</html>
